name: bloodmnist-fl
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core stack
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn

  # PyTorch and related libraries
  - pytorch
  - torchvision
  - cpuonly

  - pip:
      # Federated learning
      - "flwr[simulation]>=1.8"
      - flwr-datasets

      # Medical imaging dataset
      - medmnist

      # Notebook support
      - jupyter
      - ipykernel